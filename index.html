<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Värivaltaus / Flood Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Flood</h1>
            <div id="stats">
                <div class="stat-item">Turns: <span id="turn-count">0</span></div>
                <div id="player-scores"></div>
            </div>
        </header>
        <div id="canvas-container">
            <canvas id="game-canvas"></canvas>
        </div>
        <div id="ui-panel">
            <div id="setup-panel">
                <h3>New Game</h3>
                <div class="setup-group">
                    <label for="player-count">Players:</label>
                    <input type="number" id="player-count" value="2" min="1" max="4">
                </div>
                <div class="setup-group">
                    <label for="color-count">Colors:</label>
                    <input type="number" id="color-count" value="6" min="3" max="10">
                </div>
                <div class="setup-group">
                    <label for="color-restrictions">Restrictions:</label>
                    <select id="color-restrictions">
                        <option value="notOwnColor">Not Own Color</option>
                        <option value="notAnyPlayerColor" selected>Not Any Player Color</option>
                        <option value="notAdjacentEnemyColor">Not Adjacent Enemy Color</option>
                    </select>
                </div>
                <button id="start-button">Start Game</button>
            </div>
            <div id="controls-panel" style="display: none;">
                <div id="color-buttons"></div>
                <button id="reset-button">Back to Setup</button>
            </div>
        </div>
        <div id="game-status"></div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
